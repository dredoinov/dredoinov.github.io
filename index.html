<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bio dredoinov</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ВЕСЬ CSS ТАКОЙ ЖЕ, КАК В ПРЕДЫДУЩЕЙ ВЕРСИИ */
        /* (скопируй его из своего файла, чтобы ничего не потерять) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            background: radial-gradient(ellipse at 20% 50%, #1a0a2e 0%, #0a0412 60%, #05020a 100%);
            position: relative;
        }
        /* ... (весь остальной CSS из твоего файла) ... */
    </style>
</head>
<body>

    <!-- ОВЕРЛЕЙ ДЛЯ ЗАПУСКА МУЗЫКИ -->
    <div class="music-overlay" id="musicOverlay">
        <div class="play-btn" id="playBtn">
            🎵 Нажми для музыки
            <small>click to start</small>
        </div>
    </div>

    <!-- ... (весь HTML из твоего файла) ... -->

    <!-- АУДИО -->
    <audio id="bgMusic" loop>
        <source src="audio/Face_feat._xxxtentacion_-_Forever_Young_(SkySound.cc).mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            "use strict";

            const audio = document.getElementById('bgMusic');
            const volumeSlider = document.getElementById('volumeSlider');
            const soundIcon = document.getElementById('soundIcon');
            const volumeBtn = document.getElementById('volumeBtn');
            const overlay = document.getElementById('musicOverlay');
            const playBtn = document.getElementById('playBtn');

            let musicStarted = false;
            let isMuted = false;

            // ----- ФУНКЦИЯ ЗАПУСКА МУЗЫКИ -----
            function startMusic() {
                if (musicStarted) return;
                audio.volume = parseFloat(volumeSlider.value);
                audio.play()
                    .then(() => {
                        musicStarted = true;
                        overlay.classList.add('hidden');
                        console.log('🎵 Музыка запущена!');
                    })
                    .catch((err) => {
                        console.log('Ошибка запуска:', err);
                        setTimeout(() => {
                            audio.play().catch(() => {});
                        }, 200);
                    });
            }

            // ----- ЗАПУСК ПО КЛИКУ -----
            overlay.addEventListener('click', startMusic);
            playBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                startMusic();
            });

            // ----- КНОПКА ВКЛ/ВЫКЛ ЗВУКА -----
            volumeBtn.addEventListener('click', function(e) {
                e.stopPropagation();

                if (!musicStarted) {
                    startMusic();
                    return;
                }

                isMuted = !isMuted;

                if (isMuted) {
                    audio.volume = 0;
                    soundIcon.src = 'icons/mute.png';
                    console.log('🔇 Звук выключен');
                } else {
                    const vol = parseFloat(volumeSlider.value);
                    audio.volume = vol;
                    soundIcon.src = (vol === 0) ? 'icons/mute.png' : 'icons/sound.png';
                    console.log('🔊 Звук включен, громкость:', vol);
                }
            });

            // ----- ПОЛЗУНОК ГРОМКОСТИ -----
            volumeSlider.addEventListener('input', function() {
                const vol = parseFloat(this.value);

                if (!isMuted) {
                    audio.volume = vol;
                }

                if (vol === 0) {
                    soundIcon.src = 'icons/mute.png';
                } else {
                    soundIcon.src = 'icons/sound.png';
                }

                if (vol === 0 && !isMuted) {
                    isMuted = true;
                    audio.volume = 0;
                    soundIcon.src = 'icons/mute.png';
                } else if (vol > 0 && isMuted) {
                    isMuted = false;
                    audio.volume = vol;
                    soundIcon.src = 'icons/sound.png';
                }
            });

            // ----- ПЕРЕЗАПУСК ПРИ ОКОНЧАНИИ -----
            audio.addEventListener('ended', function() {
                this.currentTime = 0;
                if (!isMuted) {
                    this.volume = parseFloat(volumeSlider.value);
                }
                this.play().catch(() => {});
            });

            // =========================================
            // ОСТАЛЬНОЙ JS (3D, снежинки, Discord и т.д.)
            // =========================================

            // ----- 3D ЭФФЕКТ -----
            const mainWindow = document.getElementById('mainWindow');
            let isTouching = false;

            mainWindow.addEventListener('mousemove', function(e) {
                if (isTouching) return;
                const rect = this.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                this.style.transform = `perspective(900px) rotateX(${-y * 14}deg) rotateY(${x * 14}deg) scale(1.01)`;
            });
            mainWindow.addEventListener('mouseleave', function() {
                if (isTouching) return;
                this.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg) scale(1)';
            });
            mainWindow.addEventListener('touchstart', function() {
                isTouching = true;
            });
            mainWindow.addEventListener('touchend', function() {
                isTouching = false;
                this.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg) scale(1)';
            });

            // ----- КУРСОР -----
            const cursor = document.getElementById('customCursor');
            let cursorActive = false;
            mainWindow.addEventListener('mouseenter', () => { cursor.classList.add('active'); cursorActive = true; });
            mainWindow.addEventListener('mouseleave', () => { cursor.classList.remove('active'); cursorActive = false; });
            document.addEventListener('mousemove', function(e) {
                if (cursorActive) {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                }
            });

            // ----- DISCORD -----
            const discordBtn = document.getElementById('discordBtn');
            const toast = document.getElementById('toast');
            let toastTimeout;
            discordBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (!musicStarted) { startMusic(); }
                navigator.clipboard.writeText('fuckuourself').then(() => {
                    toast.classList.add('show');
                    clearTimeout(toastTimeout);
                    toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
                }).catch(() => alert('Не удалось скопировать'));
            });

            // ----- СНЕЖИНКИ -----
            const canvas = document.getElementById('snowCanvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const particles = [];
            const COUNT = 180;
            for (let i = 0; i < COUNT; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 2.5 + 1.2,
                    speed: Math.random() * 0.6 + 0.2,
                    opacity: Math.random() * 0.5 + 0.15,
                    drift: (Math.random() - 0.5) * 0.3
                });
            }

            function drawSnow() {
                ctx.clearRect(0, 0, w, h);
                for (let p of particles) {
                    p.y += p.speed;
                    p.x += p.drift + Math.sin(p.y * 0.003) * 0.2;
                    if (p.y > h) { p.y = -5; p.x = Math.random() * w; }
                    if (p.x > w) p.x = 0;
                    if (p.x < 0) p.x = w;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
                    grad.addColorStop(0, `rgba(200, 160, 255, ${p.opacity * 0.8})`);
                    grad.addColorStop(0.6, `rgba(150, 100, 220, ${p.opacity * 0.5})`);
                    grad.addColorStop(1, `rgba(100, 50, 180, 0)`);
                    ctx.fillStyle = grad;
                    ctx.shadowColor = 'rgba(155, 77, 255, 0.15)';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                }
                requestAnimationFrame(drawSnow);
            }
            drawSnow();

            // ----- ЗАГЛУШКИ -----
            document.getElementById('avatarImg').onerror = function() {
                this.alt = 'AVATAR';
                this.style.background = 'linear-gradient(135deg, #2a0a4a, #1a0b2e)';
                this.style.display = 'flex';
                this.style.alignItems = 'center';
                this.style.justifyContent = 'center';
                this.style.color = 'rgba(255,255,255,0.3)';
                this.style.fontFamily = 'Inter';
                this.style.fontSize = '0.8rem';
                this.src = '';
            };
            document.getElementById('bannerImg').onerror = function() {
                this.alt = 'BANNER';
                this.style.background = 'linear-gradient(135deg, #2a0a4a, #1a0b2e)';
                this.style.display = 'flex';
                this.style.alignItems = 'center';
                this.style.justifyContent = 'center';
                this.style.color = 'rgba(255,255,255,0.15)';
                this.style.fontFamily = 'Inter';
                this.style.fontSize = '1rem';
                this.src = '';
            };

            console.log('✨ Сайт готов! Нажми на кнопку для запуска музыки.');
        })();
    </script>
</body>
</html>
